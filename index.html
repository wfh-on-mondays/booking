<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>working from home</title>
  <meta name="description" content="working from home — low key art viewings by appointment." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::placeholder { color: #bbb; }
    html { font-size: 15px; }
    body {
      font-family: 'Sono', monospace;
      font-weight: 300;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.75;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    textarea { resize: vertical; }
    #app { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ═══════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════
    const ADMIN_PASSWORD = "gallery2026";
    const MAX_PER_SLOT = 2;
    const SUPABASE_URL = "https://rdqqclbtrdwdjgkvwxim.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkcXFjbGJ0cmR3ZGpna3Z3eGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTk1MjgsImV4cCI6MjA4Nzk3NTUyOH0.8G0W4tizXjstNa_Y5bYkcJeN0Sj98zL1ajcX6DfjrlA";

    // ═══════════════════════════════════════════
    //  SUPABASE HELPERS
    // ═══════════════════════════════════════════
    const headers = {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
    };

    const api = (table) => `${SUPABASE_URL}/rest/v1/${table}`;

    async function fetchRows(table, query = "") {
      try {
        const res = await fetch(`${api(table)}?${query}`, { headers });
        if (!res.ok) throw new Error(res.statusText);
        return await res.json();
      } catch (e) { console.error(`Fetch ${table} failed:`, e); return []; }
    }

    async function insertRow(table, data) {
      try {
        const res = await fetch(api(table), {
          method: "POST", headers, body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error(res.statusText);
        return await res.json();
      } catch (e) { console.error(`Insert ${table} failed:`, e); return null; }
    }

    async function deleteRow(table, id) {
      try {
        await fetch(`${api(table)}?id=eq.${id}`, { method: "DELETE", headers });
      } catch (e) { console.error(`Delete ${table} failed:`, e); }
    }

    async function fetchExhibition() {
      try {
        const res = await fetch(`${api("exhibition")}?id=eq.1`, { headers });
        const data = await res.json();
        if (data && data[0]) {
          const ex = data[0];
          if (typeof ex.works === "string") ex.works = JSON.parse(ex.works);
          return ex;
        }
        return DEFAULT_EXHIBITION;
      } catch (e) { console.error("Fetch exhibition failed:", e); return DEFAULT_EXHIBITION; }
    }

    async function updateExhibition(updates) {
      try {
        await fetch(`${api("exhibition")}?id=eq.1`, {
          method: "PATCH", headers, body: JSON.stringify(updates),
        });
      } catch (e) { console.error("Update exhibition failed:", e); }
    }

    const DEFAULT_EXHIBITION = {
      visible: true, title: "", artist: "", description: "", works: [],
    };

    // ═══════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════
    const mono = "'Sono', monospace";

    const formatDate = (dateStr) => {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" }).toLowerCase();
    };
    const formatDateShort = (dateStr) => {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" }).toLowerCase();
    };

    const inputStyle = {
      padding: "10px 0", border: "none", borderBottom: "1px solid #ddd",
      fontSize: "0.9rem", fontFamily: mono, fontWeight: 300,
      background: "transparent", outline: "none",
      transition: "border-color 0.3s", color: "#1a1a1a", width: "100%",
    };

    const btnStyle = {
      background: "none", border: "1px solid #ccc", padding: "8px 20px",
      cursor: "pointer", fontSize: "0.75rem", fontFamily: mono,
      fontWeight: 300, color: "#888", transition: "all 0.3s",
    };

    const btnPrimaryStyle = {
      ...btnStyle, background: "#1a1a1a", color: "#fff", border: "1px solid #1a1a1a",
    };

    const labelStyle = {
      fontSize: "0.7rem", letterSpacing: "0.06em", color: "#999",
      marginBottom: 16, display: "block",
    };

    const hoverDark = {
      onMouseEnter: e => { e.target.style.borderColor = "#1a1a1a"; e.target.style.color = "#1a1a1a"; },
      onMouseLeave: e => { e.target.style.borderColor = "#ccc"; e.target.style.color = "#888"; },
    };

    // ═══════════════════════════════════════════
    //  CONFIRMATION
    // ═══════════════════════════════════════════
    function Confirmation({ booking, onBack }) {
      return (
        <div style={{ padding: "100px 24px", maxWidth: 480, margin: "0 auto", animation: "fadeIn 0.5s ease" }}>
          <div style={{ marginBottom: 48 }}>
            <div style={labelStyle}>confirmed</div>
            <p style={{ marginBottom: 24, lineHeight: 1.9 }}>
              + you're booked in. we look forward to seeing you.
            </p>
          </div>
          <div style={{ borderTop: "1px solid #eee", paddingTop: 28, lineHeight: 2.2, fontSize: "0.9rem" }}>
            <div style={{ color: "#999", fontSize: "0.75rem" }}>date</div>
            <div style={{ marginBottom: 16 }}>{formatDate(booking.date)}</div>
            <div style={{ color: "#999", fontSize: "0.75rem" }}>time</div>
            <div style={{ marginBottom: 16 }}>{booking.time}</div>
            <div style={{ color: "#999", fontSize: "0.75rem" }}>name</div>
            <div style={{ marginBottom: 16 }}>{booking.name.toLowerCase()}</div>
            <div style={{ color: "#999", fontSize: "0.75rem" }}>email</div>
            <div>{booking.email.toLowerCase()}</div>
          </div>
          <div style={{ marginTop: 48 }}>
            <button onClick={onBack} style={btnStyle} {...hoverDark}>← back</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  EXHIBITION DISPLAY (visitor side)
    // ═══════════════════════════════════════════
    function ExhibitionDisplay({ exhibition }) {
      if (!exhibition.visible) return null;
      const hasContent = exhibition.title || exhibition.artist || exhibition.description || (exhibition.works && exhibition.works.length > 0);
      if (!hasContent) return null;

      return (
        <div style={{ marginBottom: 64, borderTop: "1px solid #eee", paddingTop: 32, animation: "fadeIn 0.5s ease 0.1s both" }}>
          <div style={labelStyle}>currently on show</div>
          {exhibition.title && (
            <div style={{ fontSize: "1.05rem", fontWeight: 400, marginBottom: 6, lineHeight: 1.5 }}>
              {exhibition.title.toLowerCase()}
            </div>
          )}
          {exhibition.artist && (
            <div style={{ fontSize: "0.85rem", color: "#888", marginBottom: 20, fontStyle: "italic" }}>
              {exhibition.artist.toLowerCase()}
            </div>
          )}
          {exhibition.description && (
            <div style={{ fontSize: "0.85rem", lineHeight: 1.9, color: "#555", marginBottom: 20, whiteSpace: "pre-line" }}>
              {exhibition.description}
            </div>
          )}
          {exhibition.works && exhibition.works.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 10 }}>works</div>
              {exhibition.works.map((w, i) => (
                <div key={i} style={{ fontSize: "0.85rem", lineHeight: 1.9, color: "#555" }}>
                  + {w.toLowerCase()}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  VISITOR VIEW
    // ═══════════════════════════════════════════
    function VisitorView({ onAdminClick }) {
      const [slots, setSlots] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [exhibition, setExhibition] = useState(DEFAULT_EXHIBITION);
      const [selectedSlot, setSelectedSlot] = useState(null);
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [submitting, setSubmitting] = useState(false);
      const [confirmed, setConfirmed] = useState(null);
      const [loading, setLoading] = useState(true);

      const refresh = useCallback(async () => {
        const [s, b, e] = await Promise.all([
          fetchRows("slots", "order=date.asc,time.asc"),
          fetchRows("bookings"),
          fetchExhibition(),
        ]);
        setSlots(s);
        setBookings(b);
        setExhibition(e);
        setLoading(false);
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      const today = new Date().toISOString().slice(0, 10);
      const availableSlots = slots
        .filter(s => s.date >= today)
        .map(s => {
          const count = bookings.filter(b => b.slot_id === s.id).length;
          return { ...s, spotsLeft: MAX_PER_SLOT - count };
        })
        .filter(s => s.spotsLeft > 0)
        .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

      const handleBook = async () => {
        if (!name.trim() || !email.trim() || !selectedSlot) return;
        setSubmitting(true);
        const newBooking = {
          id: Date.now().toString(),
          slot_id: selectedSlot.id,
          date: selectedSlot.date,
          time: selectedSlot.time,
          name: name.trim(),
          email: email.trim(),
        };
        const result = await insertRow("bookings", newBooking);
        if (result) {
          setConfirmed({ ...newBooking });
          setName("");
          setEmail("");
          setSelectedSlot(null);
          await refresh();
        }
        setSubmitting(false);
      };

      if (confirmed) {
        return <Confirmation booking={confirmed} onBack={() => { setConfirmed(null); refresh(); }} />;
      }

      const grouped = {};
      availableSlots.forEach(s => {
        if (!grouped[s.date]) grouped[s.date] = [];
        grouped[s.date].push(s);
      });

      return (
        <div style={{ maxWidth: 520, margin: "0 auto", padding: "80px 24px 120px" }}>
          {/* Header */}
          <div style={{ marginBottom: 64, animation: "fadeIn 0.6s ease" }}>
            <h1 style={{
              fontSize: "clamp(1.6rem, 4vw, 2.2rem)",
              fontWeight: 300, fontFamily: mono,
              margin: "0 0 48px 0", lineHeight: 1.3,
            }}>
              working from home
            </h1>
            <div style={{ lineHeight: 2, fontSize: "0.9rem" }}>
              <p>+ working from home is a small invitation to experience art slowly, in a home, with one or two other people. 
</p>
              <p style={{ marginTop: 12 }}>+ visits are by appointment.</p>
              <p style={{ marginTop: 12 }}>+ there will be tea.</p>
            </div>
          </div>

          {/* Exhibition info */}
          <ExhibitionDisplay exhibition={exhibition} />

          {loading ? (
            <div style={{ color: "#ccc", fontSize: "0.85rem", padding: "32px 0" }}>loading...</div>
          ) : Object.keys(grouped).length === 0 ? (
            <div style={{ animation: "fadeIn 0.5s ease", borderTop: "1px solid #eee", paddingTop: 32 }}>
              <p style={{ color: "#999", fontSize: "0.85rem" }}>
                + no viewings currently scheduled. check back soon.
              </p>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 48, animation: "fadeIn 0.5s ease 0.2s both" }}>
                <div style={labelStyle}>upcoming viewings</div>
                {Object.entries(grouped).map(([date, dateSlots]) => (
                  <div key={date} style={{ marginBottom: 28 }}>
                    <div style={{ fontSize: "0.85rem", marginBottom: 10, color: "#555" }}>
                      {formatDate(date)}
                    </div>
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                      {dateSlots.map(slot => {
                        const selected = selectedSlot?.id === slot.id;
                        return (
                          <button key={slot.id}
                            onClick={() => setSelectedSlot(selected ? null : slot)}
                            style={{
                              padding: "12px 20px",
                              background: selected ? "#1a1a1a" : "#fff",
                              color: selected ? "#fff" : "#1a1a1a",
                              border: selected ? "1px solid #1a1a1a" : "1px solid #ddd",
                              cursor: "pointer", fontSize: "0.8rem", fontFamily: mono, fontWeight: 300,
                              transition: "all 0.25s ease", lineHeight: 1.6,
                            }}
                            onMouseEnter={e => { if (!selected) e.target.style.borderColor = "#1a1a1a"; }}
                            onMouseLeave={e => { if (!selected) e.target.style.borderColor = "#ddd"; }}
                          >
                            {slot.time.toLowerCase()}
                            <span style={{
                              display: "block", fontSize: "0.65rem",
                              color: selected ? "rgba(255,255,255,0.45)" : "#bbb",
                            }}>
                              {slot.spotsLeft} {slot.spotsLeft === 1 ? "spot" : "spots"} left
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              {selectedSlot && (
                <div style={{ borderTop: "1px solid #eee", paddingTop: 32, animation: "fadeIn 0.35s ease" }}>
                  <div style={labelStyle}>your details</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    <input type="text" placeholder="full name" value={name}
                      onChange={e => setName(e.target.value)} style={inputStyle}
                      onFocus={e => e.target.style.borderBottomColor = "#1a1a1a"}
                      onBlur={e => e.target.style.borderBottomColor = "#ddd"}
                    />
                    <input type="email" placeholder="email address" value={email}
                      onChange={e => setEmail(e.target.value)} style={inputStyle}
                      onFocus={e => e.target.style.borderBottomColor = "#1a1a1a"}
                      onBlur={e => e.target.style.borderBottomColor = "#ddd"}
                    />
                    <button onClick={handleBook}
                      disabled={!name.trim() || !email.trim() || submitting}
                      style={{
                        marginTop: 12, padding: "12px 28px",
                        background: (!name.trim() || !email.trim()) ? "#eee" : "#1a1a1a",
                        color: (!name.trim() || !email.trim()) ? "#bbb" : "#fff",
                        border: "none",
                        cursor: (!name.trim() || !email.trim()) ? "default" : "pointer",
                        fontSize: "0.75rem", fontFamily: mono, fontWeight: 300,
                        transition: "all 0.3s", alignSelf: "flex-start",
                      }}
                      onMouseEnter={e => { if (name.trim() && email.trim()) e.target.style.background = "#444"; }}
                      onMouseLeave={e => { if (name.trim() && email.trim()) e.target.style.background = "#1a1a1a"; }}
                    >
                      {submitting ? "reserving..." : "reserve visit"}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}

          <div style={{ marginTop: 100, paddingTop: 32, borderTop: "1px solid #f0f0f0" }}>
            <button onClick={onAdminClick}
              style={{
                background: "none", border: "none", color: "#ddd",
                fontSize: "0.7rem", cursor: "pointer", fontFamily: mono, fontWeight: 300,
                transition: "color 0.3s",
              }}
              onMouseEnter={e => e.target.style.color = "#999"}
              onMouseLeave={e => e.target.style.color = "#ddd"}
            >admin</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  EXHIBITION EDITOR (admin side)
    // ═══════════════════════════════════════════
    function ExhibitionEditor({ exhibition, onChange }) {
      const [newWork, setNewWork] = useState("");
      const [saving, setSaving] = useState(false);

      const update = async (field, value) => {
        const updated = { ...exhibition, [field]: value };
        onChange(updated);
        setSaving(true);
        const payload = {};
        payload[field] = value;
        await updateExhibition(payload);
        setSaving(false);
      };

      const addWork = async () => {
        if (!newWork.trim()) return;
        const updatedWorks = [...(exhibition.works || []), newWork.trim()];
        const updated = { ...exhibition, works: updatedWorks };
        onChange(updated);
        await updateExhibition({ works: updatedWorks });
        setNewWork("");
      };

      const removeWork = async (index) => {
        const updatedWorks = (exhibition.works || []).filter((_, i) => i !== index);
        const updated = { ...exhibition, works: updatedWorks };
        onChange(updated);
        await updateExhibition({ works: updatedWorks });
      };

      const adminInputStyle = {
        width: "100%", padding: "8px 0", border: "none", borderBottom: "1px solid #ddd",
        fontSize: "0.85rem", fontFamily: mono, fontWeight: 300,
        background: "transparent", outline: "none", color: "#1a1a1a",
      };

      return (
        <div style={{ borderTop: "1px solid #eee", paddingTop: 28, marginBottom: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div style={{ ...labelStyle, marginBottom: 0 }}>
              exhibition info
              {saving && <span style={{ marginLeft: 8, color: "#bbb" }}>saving...</span>}
            </div>
            <label style={{ fontSize: "0.7rem", color: "#999", cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              <input type="checkbox" checked={exhibition.visible}
                onChange={e => update("visible", e.target.checked)}
                style={{ accentColor: "#1a1a1a" }}
              />
              show on site
            </label>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            <div>
              <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 6 }}>exhibition title</div>
              <input type="text" placeholder="e.g. something in the water"
                value={exhibition.title} onChange={e => update("title", e.target.value)}
                style={adminInputStyle}
              />
            </div>
            <div>
              <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 6 }}>artist(s)</div>
              <input type="text" placeholder="e.g. artist name"
                value={exhibition.artist} onChange={e => update("artist", e.target.value)}
                style={adminInputStyle}
              />
            </div>
            <div>
              <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 6 }}>description</div>
              <textarea placeholder="a short description of the show..."
                value={exhibition.description} onChange={e => update("description", e.target.value)}
                rows={4}
                style={{
                  ...adminInputStyle, borderBottom: "none", border: "1px solid #ddd",
                  padding: "10px", lineHeight: 1.7, resize: "vertical",
                }}
              />
            </div>
            <div>
              <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 10 }}>individual works</div>
              {(exhibition.works || []).map((w, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "6px 0", borderBottom: "1px solid #f5f5f5", fontSize: "0.8rem",
                }}>
                  <span>+ {w.toLowerCase()}</span>
                  <button onClick={() => removeWork(i)}
                    style={{
                      background: "none", border: "none", color: "#ddd", cursor: "pointer",
                      fontSize: "0.7rem", fontFamily: mono, transition: "color 0.2s",
                    }}
                    onMouseEnter={e => e.target.style.color = "#c44"}
                    onMouseLeave={e => e.target.style.color = "#ddd"}
                  >remove</button>
                </div>
              ))}
              <div style={{ display: "flex", gap: 10, marginTop: 10, alignItems: "flex-end" }}>
                <input type="text" placeholder="work title, year, medium..."
                  value={newWork} onChange={e => setNewWork(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addWork()}
                  style={{ ...adminInputStyle, flex: 1 }}
                />
                <button onClick={addWork} disabled={!newWork.trim()}
                  style={{
                    ...btnStyle, fontSize: "0.7rem", padding: "6px 14px",
                    opacity: newWork.trim() ? 1 : 0.4,
                    cursor: newWork.trim() ? "pointer" : "default",
                  }}>
                  + add
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  ADMIN VIEW
    // ═══════════════════════════════════════════
    function AdminView({ onBack }) {
      const [authenticated, setAuthenticated] = useState(false);
      const [password, setPassword] = useState("");
      const [wrongPw, setWrongPw] = useState(false);
      const [slots, setSlots] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [exhibition, setExhibition] = useState(DEFAULT_EXHIBITION);
      const [newDate, setNewDate] = useState("");
      const [newTime, setNewTime] = useState("14:00");
      const [loading, setLoading] = useState(true);

      const refresh = useCallback(async () => {
        const [s, b, e] = await Promise.all([
          fetchRows("slots", "order=date.asc,time.asc"),
          fetchRows("bookings"),
          fetchExhibition(),
        ]);
        setSlots(s);
        setBookings(b);
        setExhibition(e);
        setLoading(false);
      }, []);

      useEffect(() => { if (authenticated) refresh(); }, [authenticated, refresh]);

      const handleLogin = () => {
        if (password === ADMIN_PASSWORD) {
          setAuthenticated(true);
          setWrongPw(false);
        } else { setWrongPw(true); }
      };

      const addSlot = async () => {
        if (!newDate || !newTime) return;
        const timeFormatted = new Date(`2000-01-01T${newTime}`).toLocaleTimeString("en-GB", {
          hour: "2-digit", minute: "2-digit", hour12: true
        }).toLowerCase().replace(/^0/, "");
        const slot = { id: Date.now().toString(), date: newDate, time: timeFormatted };
        await insertRow("slots", slot);
        setNewDate("");
        await refresh();
      };

      const removeSlot = async (id) => {
        await deleteRow("slots", id);
        await refresh();
      };

      const removeBooking = async (id) => {
        await deleteRow("bookings", id);
        await refresh();
      };

      if (!authenticated) {
        return (
          <div style={{ maxWidth: 340, margin: "0 auto", padding: "140px 24px", animation: "fadeIn 0.5s ease" }}>
            <div style={labelStyle}>admin</div>
            <input type="password" placeholder="password" value={password}
              onChange={e => { setPassword(e.target.value); setWrongPw(false); }}
              onKeyDown={e => e.key === "Enter" && handleLogin()}
              style={{ ...inputStyle, borderBottomColor: wrongPw ? "#c44" : "#ddd" }}
            />
            {wrongPw && <div style={{ color: "#c44", fontSize: "0.75rem", marginTop: 10 }}>incorrect password</div>}
            <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
              <button onClick={handleLogin} style={btnPrimaryStyle}>enter</button>
              <button onClick={onBack} style={btnStyle} {...hoverDark}>← back</button>
            </div>
          </div>
        );
      }

      const today = new Date().toISOString().slice(0, 10);
      const upcomingSlots = slots.filter(s => s.date >= today)
        .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
      const pastSlots = slots.filter(s => s.date < today)
        .sort((a, b) => b.date.localeCompare(a.date));

      return (
        <div style={{ maxWidth: 620, margin: "0 auto", padding: "48px 24px 100px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 48 }}>
            <h1 style={{ fontSize: "1.3rem", fontWeight: 300, margin: 0, fontFamily: mono }}>
              working from home<br />
              <span style={{ color: "#bbb", fontSize: "0.8rem" }}>admin</span>
            </h1>
            <button onClick={onBack} style={btnStyle} {...hoverDark}>visitor view →</button>
          </div>

          {loading ? (
            <div style={{ color: "#ccc", fontSize: "0.85rem", padding: "32px 0" }}>loading...</div>
          ) : (
            <>
              {/* Exhibition editor */}
              <ExhibitionEditor exhibition={exhibition} onChange={setExhibition} />

              {/* Add slot */}
              <div style={{ borderTop: "1px solid #eee", paddingTop: 28, marginBottom: 40 }}>
                <div style={labelStyle}>+ create new slot</div>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div style={{ flex: 1, minWidth: 150 }}>
                    <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 6 }}>date</div>
                    <input type="date" value={newDate} min={today}
                      onChange={e => setNewDate(e.target.value)}
                      style={{
                        width: "100%", padding: "8px 6px", border: "1px solid #ddd",
                        fontSize: "0.8rem", fontFamily: mono, fontWeight: 300,
                        background: "transparent", outline: "none", color: "#1a1a1a",
                      }}
                    />
                  </div>
                  <div style={{ flex: 1, minWidth: 110 }}>
                    <div style={{ fontSize: "0.7rem", color: "#bbb", marginBottom: 6 }}>time</div>
                    <input type="time" value={newTime}
                      onChange={e => setNewTime(e.target.value)}
                      style={{
                        width: "100%", padding: "8px 6px", border: "1px solid #ddd",
                        fontSize: "0.8rem", fontFamily: mono, fontWeight: 300,
                        background: "transparent", outline: "none", color: "#1a1a1a",
                      }}
                    />
                  </div>
                  <button onClick={addSlot} disabled={!newDate}
                    style={{
                      ...btnStyle,
                      background: newDate ? "#1a1a1a" : "#eee",
                      color: newDate ? "#fff" : "#bbb",
                      border: newDate ? "1px solid #1a1a1a" : "1px solid #eee",
                      cursor: newDate ? "pointer" : "default",
                    }}>
                    add
                  </button>
                </div>
              </div>

              {/* Upcoming */}
              <div style={{ marginBottom: 48 }}>
                <div style={labelStyle}>upcoming ({upcomingSlots.length})</div>
                {upcomingSlots.length === 0 ? (
                  <p style={{ color: "#ccc", fontSize: "0.8rem" }}>no upcoming slots yet.</p>
                ) : (
                  upcomingSlots.map(slot => {
                    const slotBookings = bookings.filter(b => b.slot_id === slot.id);
                    const full = slotBookings.length >= MAX_PER_SLOT;
                    return (
                      <div key={slot.id} style={{ borderTop: "1px solid #f0f0f0", padding: "16px 0" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ fontSize: "0.85rem" }}>
                            <span style={{ fontWeight: 400 }}>{formatDateShort(slot.date)}</span>
                            <span style={{ color: "#ccc", margin: "0 8px" }}>·</span>
                            <span>{slot.time}</span>
                            <span style={{ marginLeft: 12, fontSize: "0.65rem", color: full ? "#a55" : "#5a5" }}>
                              [{slotBookings.length}/{MAX_PER_SLOT}]
                            </span>
                          </div>
                          <button onClick={() => removeSlot(slot.id)}
                            style={{
                              background: "none", border: "none", color: "#ddd",
                              cursor: "pointer", fontSize: "0.75rem", fontFamily: mono,
                              transition: "color 0.2s",
                            }}
                            onMouseEnter={e => e.target.style.color = "#c44"}
                            onMouseLeave={e => e.target.style.color = "#ddd"}
                          >×</button>
                        </div>
                        {slotBookings.map(b => (
                          <div key={b.id} style={{
                            display: "flex", justifyContent: "space-between", alignItems: "center",
                            padding: "6px 0 6px 16px", fontSize: "0.8rem", color: "#888",
                          }}>
                            <div>
                              {b.name.toLowerCase()}
                              <span style={{ color: "#ccc", marginLeft: 10, fontSize: "0.75rem" }}>{b.email.toLowerCase()}</span>
                            </div>
                            <button onClick={() => removeBooking(b.id)}
                              style={{
                                background: "none", border: "none", color: "#ddd",
                                cursor: "pointer", fontSize: "0.7rem", fontFamily: mono,
                                transition: "color 0.2s",
                              }}
                              onMouseEnter={e => e.target.style.color = "#c44"}
                              onMouseLeave={e => e.target.style.color = "#ddd"}
                            >remove</button>
                          </div>
                        ))}
                      </div>
                    );
                  })
                )}
              </div>

              {/* Past */}
              {pastSlots.length > 0 && (
                <div style={{ marginBottom: 48, opacity: 0.5 }}>
                  <div style={labelStyle}>past ({pastSlots.length})</div>
                  {pastSlots.map(slot => {
                    const slotBookings = bookings.filter(b => b.slot_id === slot.id);
                    return (
                      <div key={slot.id} style={{
                        borderTop: "1px solid #f5f5f5", padding: "10px 0", fontSize: "0.8rem",
                        display: "flex", justifyContent: "space-between", alignItems: "center",
                      }}>
                        <div>
                          {formatDateShort(slot.date)}
                          <span style={{ color: "#ddd", margin: "0 8px" }}>·</span>
                          {slot.time}
                          <span style={{ color: "#ddd", marginLeft: 10 }}>
                            {slotBookings.length} {slotBookings.length === 1 ? "visitor" : "visitors"}
                          </span>
                        </div>
                        <button onClick={() => removeSlot(slot.id)}
                          style={{ background: "none", border: "none", color: "#eee", cursor: "pointer", fontSize: "0.75rem", fontFamily: mono }}
                        >×</button>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Stats */}
              <div style={{
                borderTop: "1px solid #f0f0f0", paddingTop: 24,
                display: "flex", gap: 36, fontSize: "0.75rem",
              }}>
                {[
                  { label: "bookings", value: bookings.length },
                  { label: "upcoming", value: upcomingSlots.length },
                  { label: "unique visitors", value: new Set(bookings.map(b => b.email)).size },
                ].map(stat => (
                  <div key={stat.label}>
                    <div style={{ fontSize: "1.4rem", fontWeight: 300 }}>{stat.value}</div>
                    <div style={{ color: "#bbb", marginTop: 2 }}>{stat.label}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  APP
    // ═══════════════════════════════════════════
    function App() {
      const [view, setView] = useState("visitor");
      return (
        <div>
          {view === "visitor"
            ? <VisitorView onAdminClick={() => setView("admin")} />
            : <AdminView onBack={() => setView("visitor")} />
          }
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
